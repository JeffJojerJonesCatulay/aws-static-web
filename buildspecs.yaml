version: 0.2

phases:
  build:
    commands:
      - echo "Build phase started"
      - ls -la
      - "[ -f index.html ] && echo 'index.html found' || echo 'index.html NOT found'"
  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - '**/*'
  discard-paths: no